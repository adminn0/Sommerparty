<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grillparty Anmeldung</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>🔥 BBQ Party Anmeldung 🔥</h1>
        
        <div id="countdownBox" style="background: #1a1a1a; padding: 15px; border-radius: 10px; margin: 15px 0 25px 0; text-align: center; border: 1px solid #444;">
            <p style="font-size: 13px; color: #aaa; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 1px;">⏳ Noch bis zum Anstich:</p>
            <div id="countdown" style="font-size: 22px; font-weight: bold; color: #ff6b35; font-family: monospace;">
                00d 00h 00m 00s
            </div>
        </div>

        <p style="text-align: center; margin-bottom: 20px; color: #aaa;">Trag dich ein und gib uns deine Wünsche für die perfekte Party durch!</p>
        
        <form id="partyForm">
            <div class="form-group">
                <label for="name">Dein Name *</label>
                <input type="text" id="name" required placeholder="Wie heißt du?">
            </div>

            <div class="form-group">
                <label>Essens-Typ</label>
                <div class="radio-group">
                    <label><input type="radio" name="typ" value="Fleisch" checked> Fleisch</label>
                    <label><input type="radio" name="typ" value="Vegetarisch"> Veggie</label>
                    <label><input type="radio" name="typ" value="Vegan"> Vegan</label>
                </div>
            </div>

            <div class="form-group">
                <label for="allergien">Allergien / Unverträglichkeiten</label>
                <input type="text" id="allergien" placeholder="z.B. Nüsse, Gluten (oder leer lassen)">
            </div>

            <div class="form-group">
                <label for="getraenke">Getränkewünsche</label>
                <input type="text" id="getraenke" placeholder="Was trinkst du am liebsten?">
            </div>

            <div class="form-group">
                <label for="songs">Songwünsche (Titel und Künstler)</label>
                <input type="text" id="songs" placeholder="Welcher Song darf nicht fehlen?">
            </div>

            <div class="form-group">
                <label for="wuensche">Sonstige Wünsche / Anmerkungen</label>
                <input type="text" id="wuensche" placeholder="Was liegt dir sonst noch auf dem Herzen?">
            </div>

            <button type="submit" id="submitBtn">Eintrag abschicken!</button>
        </form>

        <div style="text-align: center; margin-top: 25px;">
            <a href="admin.html" style="color: #555; text-decoration: none; font-size: 13px; transition: color 0.2s;" onmouseover="this.style.color='#ff6b35'" onmouseout="this.style.color='#555'">🛠️ Admin-Login</a>
        </div>
    </div>

    <script>
        // Deine funktionierende Web-App-URL bleibt unangetastet
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwtLsq0eaj2aFetdlM2VhQHF2FbEiVxxkHOaLttshtHp6y4UzIpUH6VewWVAs3leJIm/exec";

        // COUNTDOWN SCRIPT (Ziel: Freitag, 12. Juni 2026, 17:00 Uhr)
        const targetDate = new Date("June 12, 2026 17:00:00").getTime();

        const countdownInterval = setInterval(function() {
            const now = new Date().getTime();
            const difference = targetDate - now;

            // Zeitberechnungen für Tage, Stunden, Minuten und Sekunden
            const days = Math.floor(difference / (1000 * 60 * 60 * 24));
            const hours = Math.floor((difference % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((difference % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((difference % (1000 * 60)) / 1000);

            // Führende Nullen hinzufügen, damit es sauber aussieht
            const dDisplay = days < 10 ? "0" + days : days;
            const hDisplay = hours < 10 ? "0" + hours : hours;
            const mDisplay = minutes < 10 ? "0" + minutes : minutes;
            const sDisplay = seconds < 10 ? "0" + seconds : seconds;

            // Text in die Box schreiben
            document.getElementById("countdown").innerHTML = dDisplay + "d " + hDisplay + "h " + mDisplay + "m " + sDisplay + "s";

            // Wenn der Countdown abgelaufen ist
            if (difference < 0) {
                clearInterval(countdownInterval);
                document.getElementById("countdownBox").innerHTML = "<p style='font-size: 18px; color: #28a745; font-weight: bold; margin: 0;'>🔥 DIE PARTY LÄUFT! 🔥</p>";
            }
        }, 1000);

        // FORMULAR-SENDESCRIPT
        document.getElementById('partyForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.innerText = "Wird gesendet...";

            const data = {
                name: document.getElementById('name').value,
                typ: document.querySelector('input[name="typ"]:checked').value,
                allergien: document.getElementById('allergien').value || "Keine",
                getraenke: document.getElementById('getraenke').value || "Keine besonderen",
                songs: document.getElementById('songs').value || "Keine",
                wuensche: document.getElementById('wuensche').value || "Keine"
            };

            fetch(SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors',
                cache: 'no-cache',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            }).then(() => {
                alert('Danke! Deine Wünsche wurden gespeichert. 🔥');
                document.getElementById('partyForm').reset();
                btn.disabled = false;
                btn.innerText = "Eintrag abschicken!";
            }).catch(err => {
                alert('Fehler beim Senden. Versuch es nochmal!');
                console.error(err);
                btn.disabled = false;
                btn.innerText = "Eintrag abschicken!";
            });
        });
    </script>
</body>
</html>
